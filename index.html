<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon & App Icon Generator</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <header>
        <div class="title-container">
            <h1>Iconify Web</h1>
        </div>
        <div class="theme-selector">
            <label for="theme">Tema:</label>
            <select id="theme" onchange="changeTheme()">
                <option value="dark">Dark (Default)</option>
                <option value="light">Light</option>
                <option value="blue-dark">Blue Dark</option>
                <option value="green-light">Green Light</option>
                <option value="orange-pink-light">Orange-Pink Light</option>
            </select>
        </div>
    </header>

    <main>
        <div class="upload-section" id="drop-zone" onclick="document.getElementById('image-upload').click()">
            <span class="upload-label">Klik atau Tarik & Lepas (Drag & Drop) Gambar di Sini</span>
            <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
            <img id="preview-img" alt="Preview Gambar">
        </div>

        <div class="settings-section" id="settings-section">
            <h3>⚙️ Pengaturan Ikon</h3>
            <div class="settings-grid">
                <div class="setting-group">
                    <label for="bg-color">Warna Latar:</label>
                    <div class="color-controls">
                        <input type="color" id="bg-color" value="#ffffff" oninput="updateSettings()">
                        <label class="checkbox-label">
                            <input type="checkbox" id="bg-transparent" onchange="updateSettings()" checked> Transparan
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="icon-padding">Jarak Tepi (<span id="padding-val">0</span>%):</label>
                    <input type="range" id="icon-padding" min="0" max="50" value="0" oninput="updateSettings()">
                </div>
                <div class="setting-group">
                    <label for="icon-radius">Sudut Membulat (<span id="radius-val">0</span>%):</label>
                    <input type="range" id="icon-radius" min="0" max="50" value="0" oninput="updateSettings()">
                </div>
                
                <div class="setting-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="pro-shadow" onchange="updateSettings()"> Aktifkan Efek Drop Shadow
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="pro-banner" onchange="updateSettings()"> Generate Banner Sosmed
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="pro-pwa" onchange="togglePwaInput()"> Generate PWA Manifest
                    </label>
                    <div id="pwa-input-container" class="pwa-input-container">
                        <label for="pwa-name">Nama Aplikasi Anda:</label>
                        <input type="text" id="pwa-name" value="My Progressive App" oninput="updateSettings()">
                    </div>
                </div>
            </div>
        </div>

        <div class="results-section" id="results-section">
            <div class="results-header">
                <h2>Hasil Icons</h2>
                <button id="btn-zip" class="btn-zip" onclick="downloadZip()">📦 Download Semua (ZIP)</button>
            </div>
            
            <div class="icon-grid" id="icon-grid">
                </div>

            <div class="code-section">
                <h2>📋 Kode HTML (Copy ke &lt;head&gt;)</h2>
                <textarea id="html-code" readonly rows="6"></textarea>
                <button onclick="copyCode('html-code', '.btn-copy-html')" class="btn-copy btn-copy-html">Copy Kode HTML</button>
            </div>

            <div class="code-section" id="manifest-section" style="display: none;">
                <h2>⚙️ PWA Web Manifest (Simpan sebagai `manifest.json`)</h2>
                <textarea id="manifest-code" readonly rows="6"></textarea>
                <button onclick="copyCode('manifest-code', '.btn-copy-manifest')" class="btn-copy btn-copy-manifest">Copy JSON Manifest</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Favicon & App Icon Generator | Versi Clean: v1.1.2</p>
        <p class="author-text">Dibuat oleh <strong>Sulfikar</strong></p>
        
        <div class="social-links">
            <a href="#" target="_blank" title="GitHub" class="social-icon github"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank" title="Discord" class="social-icon discord"><i class="fab fa-discord"></i></a>
            <a href="#" target="_blank" title="Telegram" class="social-icon telegram"><i class="fab fa-telegram"></i></a>
            <a href="#" target="_blank" title="Threads" class="social-icon threads"><i class="fab fa-threads"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
